<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Список пользователей</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark d-flex align-items-center justify-content-center vh-100">
<div class="card shadow-lg p-4" style="width: 500px; border-radius: 15px;">
  <h3 class="text-center mb-4">👥 Список пользователей</h3>

  <table class="table table-hover table-bordered text-center">
    <thead class="table-dark">
    <tr>
      <th>Группа</th>
      <th>Имя</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="user : ${users}">
      <td>
        <a th:href="@{/users/{id}(id=${user.userGroup})}"
           class="text-decoration-none fw-semibold">
          <span th:text="${user.userGroup}">Группа по умолчанию</span>
        </a>
      </td>
      <td th:text="${user.username}">Имя по умолчанию</td>
    </tr>
    </tbody>
  </table>
  <a href="/main-screen" class="btn btn-primary">Назад</a>
</div>




</body>
</html>
