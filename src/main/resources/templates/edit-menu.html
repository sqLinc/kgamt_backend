<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Изменить меню</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark d-flex align-items-center justify-content-center vh-100">

<div class="card shadow-lg p-4" style="width: 420px; border-radius: 15px;">
    <h3 class="text-center mb-4">Изменить меню на день</h3>

    <form th:action="@{/edit/menu/{date}(date=${menu.date})}" method="post">


        <div class="text-center mt-3">
            <h4 th:text="${menu.date} + ' — ' + ${menu.weekDay.displayName}"></h4>
        </div>


        <div class="mt-3" style="max-height: 300px; overflow-y: auto;">

            <div th:each="entry : ${groupedDishes}">

                <h5 class="mt-3 text-primary"
                    th:text="${entry.key.displayName}">
                </h5>

                <div th:each="dish : ${entry.value}" class="form-check">

                    <input class="form-check-input"
                           type="checkbox"
                           th:value="${dish.id}"
                           name="dishIds"
                           th:id="'dish-' + ${dish.id}"
                           th:checked="${selectedDishIds.contains(dish.id)}">

                    <label class="form-check-label"
                           th:for="'dish-' + ${dish.id}"
                           th:text="${dish.name + ' - ' + dish.price + '₽'}">
                    </label>

                </div>

            </div>

        </div>

        <div class="text-center mt-3">
            <button type="submit" class="btn btn-success w-100">
                Сохранить
            </button>
        </div>

    </form>

    <a href="/admin" class="btn btn-primary w-100 mt-2">Назад</a>

</div>

</body>
</html>
