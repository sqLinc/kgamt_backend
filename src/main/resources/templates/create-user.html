<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Создание старосты</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark d-flex align-items-center justify-content-center">
<div class="card shadow-lg p-4" style="width: 380px; border-radius: 15px;">
  <h3 class="text-center mb-4">Создать нового старосту</h3>
  <form method="post"  enctype="multipart/form-data" action="/create/user">

    <div class="mb-3">
      <label class="form-label">Логин</label>
      <input type="text" name="username" class="form-control" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Пароль</label>
      <input type="password" name="password" class="form-control" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Группа</label>
      <input type="text" name="group" class="form-control" required>
    </div>


    <button type="submit" class="btn btn-success w-100">
      Создать пользователя
    </button>
    <div th:if="${error}" class="text-danger mt-2" th:text="${error}" style="text-align: center;"></div>

  </form>
  <a href="/main-screen" class="btn btn-primary">Назад</a>
</div>
</body>
</html>
