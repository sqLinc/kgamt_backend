<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Создание блюда</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark d-flex align-items-center justify-content-center">
<div class="card shadow-lg p-4" style="width: 380px; border-radius: 15px;">
    <h3 class="text-center mb-4">Информация о старосте</h3>

    <div class="mb-3">
        <label class="form-label">Имя</label>
        <h2 th:text="${user.username}"></h2>
    </div>
    <div class="mb-3">
        <label class="form-label">Хеш пароля</label>
        <h2 th:text="${user.passwordHash}"></h2>
    </div>
    <div class="mb-3">
        <label class="form-label">Группа</label>
        <h2 th:text="${user.userGroup}"></h2>
    </div>
    <div class="mb-3">
        <label class="form-label">ID</label>
        <h2 th:text="${user.id}"></h2>
    </div>

    <a th:href="@{/edit/user/{id}(id=${user.id})}"
       class="btn btn-warning btn-sm">
        Изменить данные
    </a>
    <form th:action="@{/delete/user/{id}(id=${user.id})}" method="post" style="display:inline;">
        <input type="hidden" name="id"
               th:value="${user.id}"/>
        <input type="hidden" name="_method" value="delete"/>
        <button type="submit"
                class="btn btn-danger btn-sm w-100"
                onclick="return confirm('Удалить пользователя?');">
            Удалить пользователя
        </button>
    </form>
    <a href="/users" class="btn btn-primary w-100">Назад</a>
</div>
</body>
</html>
