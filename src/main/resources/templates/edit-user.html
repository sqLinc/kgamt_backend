<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Редактирование пользователя</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark d-flex align-items-center justify-content-center">
<div class="card shadow-lg p-4" style="width: 380px; border-radius: 15px;">
    <h3 class="text-center mb-4">Изменить данные о группе</h3>
    <form method="post"  th:action="@{/edit/user/{id}(id=${user.id})}">
        <div class="mb-3">
            <label class="form-label">Имя старосты</label>
            <input type="text" name="username" class="form-control" th:value="${user.username}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Новый пароль</label>
            <input type="password" name="new_password" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Повторите пароль</label>
            <input type="password" name="repeat_new_password" class="form-control"  required>
        </div>
        <div class="mb-3">
            <label class="form-label">Группа</label>
            <input type="text" name="userGroup" class="form-control" th:value="${user.userGroup}" required>
        </div>
        <button type="submit" class="btn btn-dark w-100">
            Обновить
        </button>
        <div th:if="${error}" class="text-danger mt-2" th:text="${error}" style="text-align: center;"></div>
    </form>
    <a href="/users" class="btn btn-primary">Назад</a>
</div>
</body>
</html>
