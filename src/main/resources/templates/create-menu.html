<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Создать меню на день</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark d-flex align-items-center justify-content-center">
<div class="card shadow-lg p-4" style="width: 380px; border-radius: 15px;">
    <h3 class="text-center mb-4">Создать меню</h3>
    <form method="post" action="/create/menu">
        <div class="mb-3">
            <label class="form-label">Дата:</label>
            <input type="date" id="dateInput" name="date" class="form-control" required/>
        </div>
        <div class="mb-3">
            <label class="form-label">Блюда:</label><br/>
            <button class="btn btn-outline-secondary w-100 mb-2"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#dishList">
                Показать / скрыть блюда
            </button>
            <div class="collapse" id="dishList">
                <div th:each="entry : ${groupedDishes}">

                    <!-- категория -->
                    <h5 th:text="${entry.key.displayName}"></h5>

                    <!-- блюда -->
                    <div th:each="dish : ${entry.value}">

                        <input type="checkbox"
                               th:value="${dish.id}"
                               name="dishIds"/>

                        <span th:text="${dish.name + ' - ' + dish.price + '₽'}"></span>

                    </div>

                </div>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">День недели</label>
            <input type="text"
                   id="weekDayDisplay"
                   class="form-control"
                   readonly
                   placeholder="Выберите дату"/>
            <input type="hidden" id="weekDayValue" name="weekDay"/>
        </div>
        <button type="submit" class="btn btn-dark w-100">
            Создать
        </button>
    </form>
    <a href="/main-screen" class="btn btn-primary mt-2">Назад</a>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const dateInput = document.getElementById("dateInput");
    const display = document.getElementById("weekDayDisplay");
    const hidden = document.getElementById("weekDayValue");
    const daysMap = {
        0: { value: "SUNDAY", label: "Воскресенье" },
        1: { value: "MONDAY", label: "Понедельник" },
        2: { value: "TUESDAY", label: "Вторник" },
        3: { value: "WEDNESDAY", label: "Среда" },
        4: { value: "THURSDAY", label: "Четверг" },
        5: { value: "FRIDAY", label: "Пятница" },
        6: { value: "SATURDAY", label: "Суббота" }
    };
    dateInput.addEventListener("change", function () {
        if (!this.value) return;
        const date = new Date(this.value);
        const day = daysMap[date.getDay()];
        display.value = day.label;
        hidden.value = day.value;
    });
</script>
</body>
</html>
